name: Pipeline — auto collect & deploy

on:
  schedule:
    - cron: '0 5 * * *'   # 08:00 Moscow time (UTC+3)
  workflow_dispatch:          # manual run from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Restore pipeline DB from last deployed state
        run: |
          mkdir -p data
          if [ -f app/data/opportunity.db ]; then
            cp app/data/opportunity.db data/opportunity.db
            echo "DB restored: $(du -sh data/opportunity.db | cut -f1)"
          else
            echo "No existing DB — starting fresh"
          fi

      - name: 1/6 Ingest
        working-directory: app
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run pipeline:ingest-megatrends

      - name: 2/6 Extract
        working-directory: app
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run pipeline:extract-megatrends

      - name: 3/6 Normalize
        working-directory: app
        run: npm run pipeline:normalize-megatrends

      - name: 4/6 Score
        working-directory: app
        run: npm run pipeline:score-megatrends

      - name: 5/6 Dedup
        working-directory: app
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run pipeline:dedup-megatrends

      - name: 6/6 Confirm
        working-directory: app
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run pipeline:confirm-megatrends

      - name: Sync DB and push
        run: |
          if [ ! -f data/opportunity.db ]; then
            echo "No DB produced — skip"
            exit 0
          fi

          cp data/opportunity.db app/data/opportunity.db

          git config user.name  "pipeline-bot"
          git config user.email "pipeline-bot@users.noreply.github.com"
          git add app/data/opportunity.db
          git diff --cached --quiet && echo "DB unchanged — skip push" && exit 0

          git commit -m "Data: pipeline run $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
          echo "Pushed — Railway will redeploy automatically"
