id: market-signal.normalized.v1
version: 1
status: active
description: >
  Normalized and structured market signal derived from a raw signal.
  Contains extracted semantic fields and assessed quality scores.
  This is the form used downstream by scoring and opportunity building.

fields:
  - name: id
    type: string
    required: true
    description: Unique identifier for this normalized signal record.

  - name: raw_signal_id
    type: string
    required: true
    description: >
      Reference to the source raw signal.
      ref: market-signal.raw.v1

  - name: audience
    type: string
    required: true
    description: >
      The target group experiencing the problem described in the signal.
      Example: "small logistics companies in RF".

  - name: problem
    type: string
    required: true
    description: >
      Concise description of the pain or problem identified in the signal.

  - name: current_workaround
    type: string
    required: false
    description: >
      How the audience currently handles the problem, if known.

  - name: evidence_strength
    type: string
    required: true
    description: Assessment of how strong and credible the signal evidence is.
    enum_values:
      - anecdotal
      - weak
      - moderate
      - strong

  - name: frequency
    type: string
    required: true
    description: How often the problem appears across sources or reports.
    enum_values:
      - rare
      - occasional
      - frequent
      - pervasive

  - name: urgency
    type: string
    required: true
    description: How urgent the problem is for the affected audience.
    enum_values:
      - low
      - medium
      - high
      - critical

  - name: confidence
    type: number
    required: true
    description: >
      Confidence score for the normalization, 0.0 to 1.0.
      Lower confidence when evidence is weak or interpretation was ambiguous.

  - name: normalized_at
    type: string
    required: true
    description: ISO 8601 datetime when normalization was performed.

  - name: normalized_by
    type: string
    required: false
    description: Identifier of the agent or person who performed normalization.
