id: discovery-request.v1
version: 1
status: active
description: >
  A manual request to evaluate a business opportunity, submitted by a founder
  or analyst. This is the raw intake event before normalization.
  Routed by hook.discovery.manual-intake.v1.

fields:
  - name: id
    type: string
    required: true
    description: Unique identifier for this discovery request.

  - name: founder_profile_id
    type: string
    required: true
    description: >
      Reference to the founder profile submitting this request.
      ref: founder-profile.v1

  - name: raw_problem_description
    type: string
    required: true
    description: >
      Free-form description of the problem or opportunity the founder wants evaluated.

  - name: target_audience
    type: string
    required: false
    description: Optional initial guess at the target audience, if provided by the founder.

  - name: context_notes
    type: string
    required: false
    description: Any additional context the founder wants to include.

  - name: submitted_at
    type: string
    required: true
    description: ISO 8601 datetime when this request was submitted.
