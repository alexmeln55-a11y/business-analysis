id: market-signal.raw.v1
version: 1
status: active
description: >
  Raw, unprocessed market signal as captured from a source.
  This is the intake form before normalization.
  Does not contain derived or scored fields.

fields:
  - name: id
    type: string
    required: true
    description: Unique identifier for this raw signal record.

  - name: source_type
    type: string
    required: true
    description: Type of source where the signal was observed.
    enum_values:
      - forum
      - social
      - interview
      - survey
      - manual_entry
      - news
      - competitor_review
      - other

  - name: source_url
    type: string
    required: false
    description: URL or reference to the original source, if available.

  - name: raw_text
    type: string
    required: true
    description: >
      The original, unedited text of the signal.
      Must not be cleaned or interpreted at this stage.

  - name: captured_at
    type: string
    required: true
    description: ISO 8601 datetime when the signal was captured.

  - name: captured_by
    type: string
    required: false
    description: Identifier of the person or agent that captured the signal.
